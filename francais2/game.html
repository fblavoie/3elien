				function makeid(length) {
					var result           = '';
					var characters       = 'abcdefghijklmnopqrstuvwxyz';
					var charactersLength = characters.length;
					for ( var i = 0; i < length; i++ ) {
						result += characters.charAt(Math.floor(Math.random() * charactersLength));
					}
					return result;
				}
				
				if(params.get("seed") === null){ // No specified seed
					// Create seed					
					var nb_letters_solution = parseInt(params.get('nb_letters'))
					seed_complete = makeid(3) + "1"
					seed_nb = 1;
				}
				else{ // Specified seed
					seed = params.get("seed").toLowerCase()
					console.log("seed",seed)
					nb_letters_solution = parseInt(seed[0])
					seed_complete = (seed.substring(1))
					seed_nb = parseInt(seed.substring(4))
				}
				console.log("seed_complete",seed_complete)
				var myrng = new Math.seedrandom(seed_complete);
				console.log("seed_nb",seed_nb)
				future_seed_nb = seed_nb + 1;
				new_seed = nb_letters_solution + seed_complete[0] + seed_complete[1] + seed_complete[2] + future_seed_nb

				}

				see_val_menu = false

					else{

				// Map creation =========================================================
				
				function isEven(n) {

				var map

				grid_name = level

				$.ajax({
				type: "GET",

				success: function(html_response) {
					
					html_response = JSON.parse(html_response)

							$("#t_"+x+"_"+y).html(map[x][y])

					not_found = true
					while(not_found){
						
						mapm = structuredClone(map)

						cy = getRandomInt(0,7-1);

						sol_path = [ cx+"_"+cy ]

							word_to_find = word_to_find + mapm[cx][cy];

							cy = cy + ll[1]

				var trial_nb = 0
				function validate(){
					console.log(letters_choice)
					validated = true

						console.log("passed")
					
						trial_nb = trial_nb + 1;
						$("#trial_nb").html(trial_nb)

							if(solutions[sol].localeCompare(s)==0 ){
								good_choice = true
							}
						}
						
						if(good_choice){
							
							winning = false;
							
							console.log("already_selected",already_selected)
						
							// Create path
							for(jjj=0;jjj<already_selected.length;jjj++){
								nf = false;
								for(iii=0;iii<nb_letters_solution;iii++){
									if( sol_path[iii].localeCompare(already_selected[jjj]) == 0){

								if(nf == false){

					}

				function calculate(number0,operator,number1){
					if( operator.localeCompare("âˆ’") == 0 ){
						r =  number0 - number1
					}
					else if( operator.localeCompare("+") == 0 ){
						r =  number0 + number1
					}
					else if( operator.localeCompare("Ã·") == 0 ){
						r =  number0 / number1
					}
					else if( operator.localeCompare("Ã—") == 0 ){
						r =  number0 * number1
					}
					return Math.round(r*100)/100
				}
